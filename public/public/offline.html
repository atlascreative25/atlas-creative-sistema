<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#d7b25a" />
  <title>Sem conexão • Atlas Creative</title>
  <style>
    body{margin:0;background:#070707;color:#fff;font-family:Arial,system-ui;display:grid;place-items:center;min-height:100vh}
    .card{max-width:520px;margin:18px;padding:18px;border-radius:18px;border:1px solid rgba(215,178,90,.25);background:linear-gradient(180deg,#0f0f10,#121214)}
    h1{margin:0 0 10px;color:#f5d36a}
    p{margin:0;color:rgba(255,255,255,.75);line-height:1.4}
    .btn{margin-top:14px;display:inline-flex;padding:10px 12px;border-radius:12px;background:linear-gradient(180deg,#f5d36a,#d7b25a);color:#000;font-weight:900;border:0}
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está sem internet</h1>
    <p>O Atlas Creative precisa de conexão para carregar pedidos, clientes e estoque.</p>
    <p style="margin-top:10px;">Assim que a internet voltar, tente novamente.</p>
    <button class="btn" onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
