<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#d7b25a" />
  <title>Sem conexão • Atlas Creative</title>
  <style>
    :root{
      --bg:#070707; --panel:#0f0f10; --panel2:#121214;
      --gold:#d7b25a; --gold2:#f5d36a;
      --muted:rgba(255,255,255,.72); --border:rgba(215,178,90,.22);
      --shadow: 0 20px 60px rgba(0,0,0,.55);
    }
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:Arial,system-ui;
      color:#fff;
      background:
        radial-gradient(900px 500px at 12% -8%, rgba(215,178,90,.18), transparent 60%),
        radial-gradient(700px 500px at 90% 0%, rgba(245,211,106,.12), transparent 55%),
        var(--bg);
    }
    .card{
      max-width:540px; margin:18px; padding:18px;
      border-radius:18px; border:1px solid var(--border);
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      box-shadow:var(--shadow);
    }
    h1{margin:0 0 10px;color:var(--gold2);letter-spacing:.2px}
    p{margin:0;color:var(--muted);line-height:1.45}
    .btn{
      margin-top:14px; display:inline-flex;
      padding:10px 12px; border-radius:12px;
      background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#000; font-weight:900; border:0; cursor:pointer;
    }
    .mini{margin-top:10px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está sem internet</h1>
    <p>O Atlas Creative precisa de conexão para carregar pedidos, clientes e estoque.</p>
    <p style="margin-top:10px;">Quando a internet voltar, toque em “Tentar de novo”.</p>
    <button class="btn" onclick="location.reload()">Tentar de novo</button>
    <div class="mini">Dica: se estiver em Wi-Fi instável, tente trocar para 4G/5G.</div>
  </div>
</body>
</html>
